services:
  chromadb:
    image: chromadb/chroma
    container_name: chromadb
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - ./chromadb_data:/chroma/chroma
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo -e \"GET /api/v2/heartbeat HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n\" > /dev/tcp/localhost/8000'"]
      interval: 5s
      retries: 5
    networks:
      - traefik-network

  app:
    image: ghcr.io/sertaykabuk/efor-sarayi/app:main
    container_name: efor-sarayi-app
    restart: unless-stopped
    expose:
      - "80"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ROOT_PATH: ${ROOT_PATH:-/efor-sarayi-api}
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      UPLOAD_DIR: /app/uploads
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AZURE_ENDPOINT: ${AZURE_ENDPOINT}
      AZURE_DEPLOYMENT_NAME: ${AZURE_DEPLOYMENT_NAME}
      AZURE_EMBEDDING_ENDPOINT: ${AZURE_EMBEDDING_ENDPOINT}
      AZURE_EMBEDDING_DEPLOYMENT_NAME: ${AZURE_EMBEDDING_DEPLOYMENT_NAME}
      AZURE_EMBEDDING_API_KEY: ${AZURE_EMBEDDING_API_KEY}
      ALLOWED_DOMAIN: ${ALLOWED_DOMAIN}
      ALLOW_SEED_BYPASS_AUTH: ${ALLOW_SEED_BYPASS_AUTH:-false}
      SEED_AUTH_TOKEN: ${SEED_AUTH_TOKEN:-}
    volumes:
      - ./${UPLOADS_DIR:-uploads}:/app/uploads
    depends_on:
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/efor-sarayi-api/health"]
      interval: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.efor-sarayi-api.rule=Host(`iscozumleritest.d-teknoloji.com.tr`) && PathPrefix(`/efor-sarayi-api`)"
      - "traefik.http.routers.efor-sarayi-api.entrypoints=web"
      - "traefik.http.routers.efor-sarayi-api.service=efor-sarayi-app"
      - "traefik.http.routers.efor-sarayi-api.priority=200"
      - "traefik.http.routers.efor-sarayi-frontend.rule=Host(`iscozumleritest.d-teknoloji.com.tr`) && PathPrefix(`/efor-sarayi`)"
      - "traefik.http.routers.efor-sarayi-frontend.entrypoints=web"
      - "traefik.http.routers.efor-sarayi-frontend.service=efor-sarayi-app"
      - "traefik.http.routers.efor-sarayi-frontend.priority=100"
      - "traefik.http.services.efor-sarayi-app.loadbalancer.server.port=80"
    networks:
      - traefik-network
      - db_network

networks:
  traefik-network:
    external: true
  db_network:
    external: true

