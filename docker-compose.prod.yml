services:
  chromadb:
    image: chromadb/chroma
    container_name: chromadb
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - ./chromadb_data:/chroma/chroma
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo -e \"GET /api/v2/heartbeat HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n\" > /dev/tcp/localhost/8000'"]
      interval: 5s
      retries: 5
    networks:
      - traefik-network

  backend:
    image: ghcr.io/sertaykabuk/efor-sarayi/backend:main
    container_name: efor-sarayi-backend
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ROOT_PATH: ${ROOT_PATH:-/efor-sarayi-api}
      CHROMA_HOST: ${CHROMA_HOST:-chromadb}
      CHROMA_PORT: ${CHROMA_PORT:-8000}
      UPLOAD_DIR: /app/uploads
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AZURE_ENDPOINT: ${AZURE_ENDPOINT}
      AZURE_DEPLOYMENT_NAME: ${AZURE_DEPLOYMENT_NAME}
      AZURE_EMBEDDING_ENDPOINT: ${AZURE_EMBEDDING_ENDPOINT}
      AZURE_EMBEDDING_DEPLOYMENT_NAME: ${AZURE_EMBEDDING_DEPLOYMENT_NAME}
      AZURE_EMBEDDING_API_KEY: ${AZURE_EMBEDDING_API_KEY}
      ALLOWED_DOMAIN: ${ALLOWED_DOMAIN}
      ALLOW_SEED_BYPASS_AUTH: ${ALLOW_SEED_BYPASS_AUTH:-false}
      SEED_AUTH_TOKEN: ${SEED_AUTH_TOKEN:-}
    volumes:
      - ./${UPLOADS_DIR:-uploads}:/app/uploads
    depends_on:
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      # Main router for /efor-sarayi-api path
      - "traefik.http.routers.efor-sarayi-backend.rule=Host(`iscozumleritest.d-teknoloji.com.tr`) && PathPrefix(`/efor-sarayi-api`)"
      - "traefik.http.routers.efor-sarayi-backend.entrypoints=web"
      # Service port
      - "traefik.http.services.efor-sarayi-backend.loadbalancer.server.port=8080"
    networks:
      - traefik-network
      - db_network
  frontend:
    restart: unless-stopped
    image: ghcr.io/sertaykabuk/efor-sarayi/frontend:main
    container_name: efor-sarayi-frontend
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      # Main router for /efor-sarayi path
      - "traefik.http.routers.efor-sarayi-frontend.rule=Host(`iscozumleritest.d-teknoloji.com.tr`) && PathPrefix(`/efor-sarayi`)"
      - "traefik.http.routers.efor-sarayi-frontend.entrypoints=web"
      # Service port
      - "traefik.http.services.efor-sarayi-frontend.loadbalancer.server.port=80"

networks:
  traefik-network:
    external: true
  db_network:
    external: true

