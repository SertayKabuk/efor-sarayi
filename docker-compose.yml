services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    env_file:
      - ./.env
    volumes:
      - ./pgdata:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:1.0.12
    ports:
      - "8000:8000"
    volumes:
      - ./chromadb_data:/chroma/chroma
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo -e \"GET /api/v2/heartbeat HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n\" > /dev/tcp/localhost/8000'"]
      interval: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      CHROMA_HOST: ${CHROMA_HOST:-chromadb}
      CHROMA_PORT: ${CHROMA_PORT:-8000}
      UPLOAD_DIR: /app/uploads
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AZURE_ENDPOINT: ${AZURE_ENDPOINT}
      AZURE_DEPLOYMENT_NAME: ${AZURE_DEPLOYMENT_NAME}
      AZURE_EMBEDDING_ENDPOINT: ${AZURE_EMBEDDING_ENDPOINT}
      AZURE_EMBEDDING_DEPLOYMENT_NAME: ${AZURE_EMBEDDING_DEPLOYMENT_NAME}
      AZURE_EMBEDDING_API_KEY: ${AZURE_EMBEDDING_API_KEY}
      ALLOWED_DOMAIN: ${ALLOWED_DOMAIN}
      ALLOW_SEED_BYPASS_AUTH: ${ALLOW_SEED_BYPASS_AUTH:-false}
      SEED_AUTH_TOKEN: ${SEED_AUTH_TOKEN:-}
    volumes:
      - ./${UPLOADS_DIR:-uploads}:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    env_file:
      - ./frontend/.env
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy